<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYROX China · Athlete Intelligence Hub</title>
<style>
:root{
  --ink:#11110f;--muted:#6d675d;--soft:#a39b8e;--line:#ded8cc;
  --bg:#f6f3ec;--panel:#fffdfa;--green:#0b7350;--red:#b43a34;
  --amber:#a56410;--blue:#2459a8;--purple:#6350a8;--lime:#a8d400;
  --r:8px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif}
button,input,select,textarea{font:inherit}
.app{min-height:100vh;display:grid;grid-template-columns:250px 1fr}
.side{background:var(--ink);color:#fff;padding:22px 18px;position:sticky;top:0;height:100vh}
.brand{font-weight:850;letter-spacing:.03em;font-size:16px;line-height:1.2}
.tag{margin-top:5px;color:#c9c2b6;font-size:11px;text-transform:uppercase;letter-spacing:.12em}
.nav{margin-top:28px;display:grid;gap:6px}
.nav button{border:0;background:transparent;color:#ddd6ca;text-align:left;padding:9px 10px;border-radius:6px;cursor:pointer}
.nav button.on,.nav button:hover{background:rgba(168,212,0,.14);color:#fff}
.side-card{margin-top:28px;border:1px solid rgba(255,255,255,.16);border-radius:var(--r);padding:12px;color:#ddd6ca;font-size:12px}
.main{padding:22px;min-width:0}
.top{display:flex;align-items:flex-start;gap:14px;justify-content:space-between;margin-bottom:18px}
h1{font-size:24px;line-height:1.15;margin:0 0 5px;font-weight:850}
.sub{color:var(--muted);font-size:13px}
.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 9px;background:var(--panel);font-size:12px;color:var(--muted);white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.grid{display:grid;grid-template-columns:1.08fr .92fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.head{padding:13px 15px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.title{font-weight:760;font-size:14px}
.hint{font-size:12px;color:var(--muted);margin-top:2px}
.body{padding:14px 15px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:13px}
.stat b{display:block;font-size:24px;line-height:1;margin-bottom:4px}
.stat span{font-size:12px;color:var(--muted)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.input,.select,.textarea{border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);padding:8px 10px;outline:none}
.input{min-width:220px;flex:1}
.textarea{width:100%;min-height:88px;resize:vertical}
.input:focus,.select:focus,.textarea:focus{border-color:var(--soft)}
.btn{border:1px solid var(--ink);background:var(--ink);color:#fff;border-radius:6px;padding:8px 11px;cursor:pointer}
.btn.secondary{background:#fff;color:var(--ink);border-color:var(--line)}
.btn:hover{opacity:.84}
.item{border-bottom:1px solid var(--line);padding:10px 0}
.item:first-child{padding-top:0}
.item:last-child{border-bottom:0;padding-bottom:0}
.item-title{font-weight:680;margin-bottom:3px}
.meta{font-size:12px;color:var(--muted)}
.badge{display:inline-flex;border-radius:4px;padding:2px 7px;font-size:11px;border:1px solid transparent;vertical-align:middle}
.red{background:rgba(180,58,52,.08);color:var(--red);border-color:rgba(180,58,52,.18)}
.amber{background:rgba(165,100,16,.08);color:var(--amber);border-color:rgba(165,100,16,.18)}
.blue{background:rgba(36,89,168,.08);color:var(--blue);border-color:rgba(36,89,168,.18)}
.green{background:rgba(11,115,80,.08);color:var(--green);border-color:rgba(11,115,80,.18)}
.purple{background:rgba(99,80,168,.08);color:var(--purple);border-color:rgba(99,80,168,.18)}
.ghost{background:#f1ede4;color:var(--muted);border-color:var(--line)}
.bar{height:6px;background:#ece7dc;border-radius:4px;overflow:hidden;margin-top:7px}
.fill{height:100%;background:var(--ink)}
.code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;background:#f0ece3;border:1px solid var(--line);border-radius:6px;padding:9px;overflow:auto;white-space:pre-wrap}
.section{display:none}
.section.on{display:block}
.tile-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.tile{border:1px solid var(--line);border-radius:6px;padding:11px;background:#fff}
.tile h3{margin:0 0 6px;font-size:13px}
.tile p{margin:0;color:var(--muted);font-size:12px}
.feedback-row{border-left:3px solid var(--line);padding:8px 10px;background:#fff;margin-bottom:8px;border-radius:0 6px 6px 0}
.feedback-row.redline{border-left-color:var(--red)}
.feedback-row.blueline{border-left-color:var(--blue)}
.small{font-size:12px;color:var(--muted)}
.dept-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.dept-tabs button{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:999px;padding:6px 10px;cursor:pointer}
.dept-tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
@media(max-width:900px){
  .app{display:block}
  .side{position:static;height:auto}
  .nav{grid-template-columns:repeat(2,1fr);margin-top:18px}
  .grid,.grid3,.tile-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">HYROX CHINA<br>ATHLETE INTELLIGENCE HUB</div>
    <div class="tag">Brand · Service · Ops · Partners</div>
    <div class="nav">
      <button class="on" data-page="dashboard">总览</button>
      <button data-page="outputs">固定产出</button>
      <button data-page="channels">渠道设计</button>
      <button data-page="social">Social Sweep</button>
      <button data-page="departments">部门视角</button>
      <button data-page="standards">Standards</button>
      <button data-page="feedback">Signals</button>
      <button data-page="sync">coze 互通</button>
    </div>
    <div class="side-card">
      <div>系统定位</div>
      <strong style="display:block;margin-top:4px;color:#fff">把选手声音变成品牌资产和部门动作</strong>
      <div style="margin-top:7px">客服、现场、社媒、社群、产品行为和合作伙伴反馈进入同一套 intelligence schema。</div>
    </div>
  </aside>

  <main class="main">
    <div class="top">
      <div>
        <h1 id="page-title">总览</h1>
        <div class="sub" id="page-sub">每周产出 Brand Pulse、Ops Action、客服口径、社媒摘要和赞助商体验 notes。</div>
      </div>
      <span class="pill"><span class="dot"></span><span id="api-state">静态数据已加载</span></span>
    </div>

    <section class="section on" id="dashboard"></section>
    <section class="section" id="outputs"></section>
    <section class="section" id="channels"></section>
    <section class="section" id="social"></section>
    <section class="section" id="departments"></section>
    <section class="section" id="standards"></section>
    <section class="section" id="feedback"></section>
    <section class="section" id="sync"></section>
  </main>
</div>

<script>
const files = ['meta','tc','waiver','faq','rulebook','rulebook_doubles','rulebook_relay','stations','feedback','tickets','intelligence','social_signals'];
const D = {};
let apiOnline = false;
let apiBase = '';
let activeDept = 'Brand / Marketing';

const labels = {
  registration:'报名/购票','refund-change':'退款/变更','rules-judging':'规则/裁判',
  results:'成绩/计时','race-day-flow':'比赛日流程','venue-supply':'场地/补给',
  'relay-doubles':'双人/接力','health-safety':'健康与安全',other:'其他'
};

function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function badge(text,type='ghost'){return `<span class="badge ${type}">${esc(text)}</span>`}
function stat(label,val,hint){return `<div class="stat"><b>${esc(val)}</b><span>${esc(label)} · ${esc(hint)}</span></div>`}
function typeColor(v){return v==='P0'?'red':v==='P1'?'amber':v==='P2'?'blue':'ghost'}
function socialBookmarkletHref(){
  const code = `(()=>{const text=(getSelection&&String(getSelection()))||document.title;const content=prompt('HYROX post text / selected comments',text);if(!content)return;const platform=prompt('Platform: 小红书/抖音/微博','');const event=prompt('Event code, e.g. SHA-2026','');fetch('http://localhost:5000/api/social/ingest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:'HYROX',platform,event,url:location.href,content})}).then(r=>r.ok?alert('Saved to HYROX Hub'):alert('Save failed: start Hub API first')).catch(()=>alert('Save failed: start Hub API first'));})()`;
  return 'javascript:' + encodeURIComponent(code);
}

async function load(){
  await Promise.all(files.map(f=>fetch(`data/${f}.json`).then(r=>r.json()).then(j=>D[f]=j).catch(()=>D[f]=null)));
  for(const base of ['', 'http://localhost:5000']){
    try{
      const r = await fetch(`${base}/health`);
      if(r.ok){apiOnline = true; apiBase = base; break}
    }catch(e){}
  }
  document.getElementById('api-state').textContent = apiOnline ? 'Hub API 在线' : '静态模式';
  renderAll();
}

function renderAll(){
  renderDashboard(); renderOutputs(); renderChannels(); renderSocial(); renderDepartments();
  renderStandards(); renderFeedback(); renderSync();
}

function renderDashboard(){
  const fb = D.feedback || {};
  const raw = fb.raw_items || [];
  const intel = D.intelligence || {};
  const social = D.social_signals || {};
  const p0 = (intel.channels||[]).filter(c=>c.priority==='P0').length;
  const highRisk = social.summary?.risks?.high || 0;
  const topTags = (fb.tags||[]).slice(0,5).map(t=>{
    const pct = raw.length ? Math.round(t.count / raw.length * 100) : 0;
    return `<div class="item"><div class="item-title">${esc(t.tag)} ${badge(`${t.count}条`,t.negative>=3?'red':'amber')}</div><div class="meta">负面 ${t.negative||0} 条 · ${esc(t.trend||'')}</div><div class="bar"><div class="fill" style="width:${pct}%"></div></div></div>`;
  }).join('');
  document.getElementById('dashboard').innerHTML = `
    <div class="grid3">
      ${stat('固定产出', (intel.outputs||[]).length, '每周/赛后可交付')}
      ${stat('Social Posts', social.summary?.total || 0, `HYROX 搜索结果 · 高风险 ${highRisk}`)}
      ${stat('当前反馈', raw.length, `${p0} 个 P0 渠道优先接入`)}
    </div>
    <div class="grid">
      <div class="card"><div class="head"><div><div class="title">Hub 应该产出的不是“投诉列表”</div><div class="hint">而是品牌、运营、客服、社媒、商务都能拿去用的 intelligence</div></div></div><div class="body">
        <div class="tile-grid">
          <div class="tile"><h3>Brand Pulse</h3><p>正面口碑、可传播原话、舆论风险、内容机会。</p></div>
          <div class="tile"><h3>Ops Action</h3><p>现场卡点、下站风险、裁判/动线/物资改进。</p></div>
          <div class="tile"><h3>Service Brief</h3><p>客服口径、FAQ 更新、升级规则、高风险工单。</p></div>
          <div class="tile"><h3>Partner Notes</h3><p>赞助触点反馈、选手偏好、商务复盘素材。</p></div>
        </div>
      </div></div>
      <div class="card"><div class="head"><div><div class="title">当前高频信号</div><div class="hint">来自 Athlete Feedback，用于示例展示</div></div></div><div class="body">${topTags || '<div class="small">暂无反馈</div>'}</div></div>
    </div>`;
}

function renderSocial(){
  const social = D.social_signals || {items:[],summary:{}};
  const rows = (social.items||[]).slice(0,30).map(i=>`
    <div class="item">
      <div class="item-title">${badge(i.platform||'unknown','blue')} ${badge(i.sentiment||'neutral',i.sentiment==='negative'?'red':i.sentiment==='positive'?'green':'ghost')} ${badge(i.risk_level||'low',i.risk_level==='high'?'red':i.risk_level==='medium'?'amber':'ghost')}</div>
      <div>${esc(i.content || i.url || '')}</div>
      <div class="meta" style="margin-top:4px">${esc(i.event||'未标记赛站')} · ${esc(labels[i.topic]||i.topic||'其他')} · owner: ${esc(i.owner||'-')}</div>
      ${i.comments?.length ? `<div class="small" style="margin-top:6px">评论摘要：${esc(i.comments.slice(0,3).join(' / '))}</div>` : ''}
      ${i.url ? `<div class="small" style="margin-top:4px">${esc(i.url)}</div>` : ''}
    </div>`).join('');
  const s = social.summary || {};
  document.getElementById('social').innerHTML = `
    <div class="grid3">
      ${stat('收集帖子', s.total || 0, '统一搜索 HYROX')}
      ${stat('负面/中性/正面', `${s.sentiment?.negative||0}/${s.sentiment?.neutral||0}/${s.sentiment?.positive||0}`, '自动初判')}
      ${stat('高风险', s.risks?.high || 0, '需 PR/管理层关注')}
    </div>
    <div class="grid">
      <div class="card"><div class="head"><div><div class="title">Collector 自动入库</div><div class="hint">主流程：采集器/供应商/API 把 HYROX 搜索结果推到 Hub</div></div></div><div class="body">
        <div class="code">POST http://localhost:5000/api/social/batch
Content-Type: application/json

{
  "items": [
    {
      "platform": "小红书",
      "event": "SHA-2026",
      "url": "https://...",
      "content": "帖子正文或摘要",
      "comments": ["代表性评论1", "代表性评论2"]
    }
  ]
}</div>
        <div class="small" style="margin-top:10px">这个入口给自动采集器用：RPA、舆情供应商、平台授权导出、或你们自己的数据脚本都可以直接推 JSON。</div>
        <div style="height:1px;background:var(--line);margin:14px 0"></div>
        <div class="title" style="margin-bottom:4px">兜底手动入库</div>
        <div class="toolbar">
          <select class="select" id="social-platform"><option>小红书</option><option>抖音</option><option>微博</option><option>视频号</option><option>Instagram</option><option>其他</option></select>
          <input class="input" id="social-event" placeholder="赛站，例如 SHA-2026">
        </div>
        <input class="input" id="social-url" placeholder="帖子链接，可选" style="width:100%;margin-bottom:8px">
        <textarea class="textarea" id="social-content" placeholder="帖子正文/标题/口播摘要"></textarea>
        <textarea class="textarea" id="social-comments" placeholder="评论摘要：一行一条，可选" style="margin-top:8px"></textarea>
        <div style="margin-top:9px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button class="btn" onclick="submitSocial()">写入 Social Signals</button>
          <button class="btn secondary" onclick="summarizeSocial()">重新汇总</button>
          <span class="small" id="social-msg"></span>
        </div>
        <div style="height:1px;background:var(--line);margin:14px 0"></div>
        <div class="title" style="margin-bottom:4px">兜底批量粘贴</div>
        <div class="small" style="margin-bottom:8px">只作为临时兜底，不作为主流程。</div>
        <textarea class="textarea" id="social-bulk" placeholder="小红书&#9;SHA-2026&#9;https://...&#9;HYROX 完赛体验很燃&#9;评论1 / 评论2"></textarea>
        <div style="margin-top:9px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button class="btn" onclick="submitSocialBulk()">批量写入</button>
          <span class="small" id="social-bulk-msg"></span>
        </div>
      </div></div>
      <div class="card"><div class="head"><div><div class="title">现在怎么做</div><div class="hint">最小流程</div></div></div><div class="body">
        <div class="tile"><h3>推荐：买/接一个舆情采集源</h3><p>供应商负责微博/小红书/抖音搜索 HYROX，并每天/赛后推 JSON 到 Hub。</p></div>
        <div class="tile" style="margin-top:10px"><h3>低成本：RPA 采集器</h3><p>用一台登录了账号的机器跑浏览器自动化，搜索 HYROX，抓可见帖子和评论，再调用 /api/social/batch。</p></div>
        <div class="tile" style="margin-top:10px"><h3>Hub 只做接收和判断</h3><p>Hub 不负责硬爬平台；它负责归类、情绪、风险、部门分发和报告。</p></div>
      </div></div>
    </div>
    <div class="card" style="margin-top:14px"><div class="head"><div><div class="title">已收集帖子</div><div class="hint">按导入时间倒序</div></div></div><div class="body">${rows || '<div class="small">暂无社媒帖子</div>'}</div></div>`;
}

function renderOutputs(){
  const rows = (D.intelligence?.outputs||[]).map(o=>`
    <div class="item">
      <div class="item-title">${esc(o.name)} ${badge(o.cadence,'green')}</div>
      <div class="meta">${esc(o.owner)} · ${esc(o.purpose)}</div>
      <div style="margin-top:7px;display:flex;gap:5px;flex-wrap:wrap">${(o.sections||[]).map(s=>badge(s,'ghost')).join('')}</div>
      <div class="small" style="margin-top:7px">动作：${esc((o.example_actions||[]).join(' / '))}</div>
    </div>`).join('');
  document.getElementById('outputs').innerHTML = `
    <div class="card"><div class="head"><div><div class="title">固定产出</div><div class="hint">让 Hub 每周自动交付，而不是只展示数据</div></div></div><div class="body">${rows}</div></div>`;
}

function renderChannels(){
  const channels = D.intelligence?.channels || [];
  const rows = channels.map(c=>`
    <div class="item">
      <div class="item-title">${esc(c.name)} ${badge(c.priority,typeColor(c.priority))} ${badge(c.type,'ghost')}</div>
      <div class="meta">${esc(c.value)}</div>
      <div style="margin-top:7px"><strong style="font-size:12px">采集：</strong><span class="small">${esc(c.capture_method)}</span></div>
      <div style="margin-top:7px;display:flex;gap:5px;flex-wrap:wrap">${(c.signals||[]).map(s=>badge(s,'blue')).join('')}</div>
    </div>`).join('');
  const schema = (D.intelligence?.intake_schema||[]).map(s=>badge(s,'ghost')).join('');
  document.getElementById('channels').innerHTML = `
    <div class="grid">
      <div class="card"><div class="head"><div><div class="title">渠道组合</div><div class="hint">不要只靠微信聊天和公开平台抓取</div></div></div><div class="body">${rows}</div></div>
      <div class="card"><div class="head"><div><div class="title">为什么不做大问卷</div><div class="hint">问卷不是错，但不能成为主渠道</div></div></div><div class="body">
        <div class="tile"><h3>用 Micro Pulse 替代长问卷</h3><p>在完赛后、客服解决后、照片发布后，只问一个问题，加一句可选原因。</p></div>
        <div class="tile" style="margin-top:10px"><h3>用行为数据补足“没说出口”的问题</h3><p>FAQ 搜索无结果、退款页面反复退出、改名入口重复点击，比问卷更真实。</p></div>
        <div class="tile" style="margin-top:10px"><h3>用 Captain Notes 捕捉早期情绪</h3><p>合作健身房、社群主理人每周 3 分钟摘录，比公开舆论更早发现趋势。</p></div>
        <div class="small" style="margin-top:12px">统一 intake schema：<br><span style="display:flex;gap:5px;flex-wrap:wrap;margin-top:7px">${schema}</span></div>
      </div></div>
    </div>`;
}

function renderDepartments(){
  const outputs = D.intelligence?.outputs || [];
  const depts = [...new Set(outputs.flatMap(o=>o.audience||[]))];
  if(!depts.includes(activeDept)) activeDept = depts[0] || '';
  const tabs = depts.map(d=>`<button class="${d===activeDept?'on':''}" onclick="activeDept='${esc(d)}';renderDepartments()">${esc(d)}</button>`).join('');
  const relevant = outputs.filter(o=>(o.audience||[]).includes(activeDept));
  const body = relevant.map(o=>`
    <div class="item">
      <div class="item-title">${esc(o.name)} ${badge(o.cadence,'green')}</div>
      <div class="meta">${esc(o.purpose)}</div>
      <div class="small" style="margin-top:7px">可以拿去做：${esc((o.example_actions||[]).join(' / '))}</div>
    </div>`).join('');
  document.getElementById('departments').innerHTML = `
    <div class="card"><div class="head"><div><div class="title">部门视角</div><div class="hint">每个部门看到自己能用的输出</div></div></div><div class="body">
      <div class="dept-tabs">${tabs}</div>
      ${body || '<div class="small">暂无配置</div>'}
    </div></div>`;
}

function renderStandards(){
  const tc = D.tc || {};
  const faqCount = (D.faq?.categories||[]).reduce((s,c)=>s+c.items.length,0);
  const cards = [
    ['T&C', `版本 ${tc.version||'-'} · ${tc.territory||''}`, '票种、退款、取消资格、赛事取消、年龄政策。'],

    ['Rulebook · Single', `Season ${D.rulebook?.version||'-'}`, D.rulebook?.concept || ''],
    ['Rulebook · Doubles', `Season ${D.rulebook_doubles?.version||'-'}`, D.rulebook_doubles?.concept || ''],
    ['Rulebook · Relay', `Season ${D.rulebook_relay?.version||'-'}`, D.rulebook_relay?.concept || ''],

    <div class="toolbar"><input class="input" id="std-q" placeholder="搜索 standards，例如：退款、Wall Ball、Doubles换人"><button class="btn" onclick="searchStandards()">搜索</button></div>

    </div>`;
}

function localStandardChunks(){
  const chunks = [];
  (D.faq?.categories||[]).forEach(c=>(c.items||[]).forEach(i=>chunks.push({source:'faq',section:c.name,title:i.question,text:i.answer})));
  ['tc','waiver','rulebook','rulebook_doubles','rulebook_relay','stations'].forEach(k=>chunks.push({source:k,section:'document',title:k,text:JSON.stringify(D[k]||{})}));
  return chunks;
}

async function searchStandards(){
  const q = document.getElementById('std-q').value.trim();
  const box = document.getElementById('std-results');
  if(!q){box.innerHTML='<div class="small">输入关键词后搜索。</div>';return}
  box.innerHTML='<div class="small">搜索中...</div>';
  let results = [];
  if(apiOnline){
    try{
      const r = await fetch(`${apiBase}/api/standards/search`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,limit:8})});
      results = (await r.json()).results || [];
    }catch(e){}
  }
  if(!results.length){
    results = localStandardChunks().filter(c=>(`${c.source} ${c.section} ${c.title} ${c.text}`).toLowerCase().includes(q.toLowerCase())).slice(0,8);
  }
  box.innerHTML = results.length ? results.map(r=>`<div class="item"><div class="item-title">${badge(r.source,'green')} ${esc(r.title||r.section)}</div><div class="meta">${esc(r.section||'')}</div><div style="margin-top:5px">${esc(String(r.text||'').slice(0,500))}</div></div>`).join('') : '<div class="small">没有匹配结果。</div>';
}

async function submitFeedback(){
  const msg = document.getElementById('fb-msg');
  const text = document.getElementById('fb-text').value.trim();
  if(!text){msg.textContent='请先输入内容';return}
  if(!apiOnline){msg.textContent='当前是静态模式，需要启动后端 API 才能写入';return}
  msg.textContent='写入中...';
  const payload = {text,source:document.getElementById('fb-source').value,event:document.getElementById('fb-event').value};
  const r = await fetch(`${apiBase}/api/feedback/ingest`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  if(!r.ok){msg.textContent='写入失败';return}
  D.feedback = (await r.json()).feedback;
  document.getElementById('fb-text').value='';
  msg.textContent='已写入并归纳';
  renderAll();
}

  if(!apiOnline){msg.textContent='当前是静态模式，需要启动后端 API 才能写入';return}
  msg.textContent='写入中...';
  const payload = {
    query:'HYROX',
    platform:document.getElementById('social-platform').value,
    event:document.getElementById('social-event').value,
    url,
    content,
    comments:document.getElementById('social-comments').value
  };
  const r = await fetch(`${apiBase}/api/social/ingest`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});

function parseSocialBulk(text){
  const trimmed = text.trim();
  if(!trimmed) return [];
  if(trimmed.startsWith('[')){
    try { return JSON.parse(trimmed); } catch(e) { return []; }
  }
  return trimmed.split(/\n+/).map(line=>line.trim()).filter(Boolean).map(line=>{
    const cols = line.includes('\t') ? line.split('\t') : line.split(',');
    return {
      query:'HYROX',
      platform:(cols[0]||'').trim() || 'unknown',
      event:(cols[1]||'').trim(),
      url:(cols[2]||'').trim(),
      content:(cols[3]||'').trim(),
      comments:(cols.slice(4).join(' ').trim() || '').split(/\s*\/\s*|\n+/).filter(Boolean)
    };
  }).filter(item=>item.content || item.url);
}

async function submitSocialBulk(){
  const msg = document.getElementById('social-bulk-msg');
  const items = parseSocialBulk(document.getElementById('social-bulk').value);
  if(!items.length){msg.textContent='没有识别到可导入内容';return}
  if(!apiOnline){msg.textContent='当前是静态模式，需要启动后端 API 才能写入';return}
  msg.textContent=`写入 ${items.length} 条中...`;
  const r = await fetch(`${apiBase}/api/social/batch`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items})});
  if(!r.ok){msg.textContent='批量写入失败';return}
  D.social_signals = (await r.json()).social;
  document.getElementById('social-bulk').value='';
  msg.textContent=`已写入 ${items.length} 条`;
  renderAll();
}
